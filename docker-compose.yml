services:
  db:
    image: pgvector/pgvector:pg16
    container_name: rag_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $DATABASE_USER -d $DATABASE_NAME"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: rag_api
    env_file:
      - .env
    ports:
      - "$APP_PORT:$APP_PORT"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app

volumes:
  postgres_data:
